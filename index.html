<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pointage">
<meta name="theme-color" content="#0f1117">
<title>Pointage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1f2436;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f7;--muted:#6b7280;
  --green:#22c98a;--green-dim:rgba(34,201,138,0.12);
  --red:#f05c5c;--red-dim:rgba(240,92,92,0.12);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,0.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;overscroll-behavior:none}
.app{max-width:420px;margin:0 auto;padding:0 0 3rem;min-height:100dvh}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px 4px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:.04em;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:var(--sans)}
.tab.active{color:var(--text);border-bottom-color:var(--green)}

.page{display:none}.page.active{display:block}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem .5rem}
.topbar-title{font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.topbar-date{font-family:var(--mono);font-size:12px;color:var(--muted)}

.clock{font-family:var(--mono);font-size:50px;font-weight:400;color:var(--text);letter-spacing:-2px;line-height:1;text-align:center;padding:.5rem 0 .2rem}
.week-info{font-size:12px;color:var(--muted);font-family:var(--mono);text-align:center;margin-bottom:.75rem}

.solde-banner{margin:0 1.25rem .75rem;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid}
.solde-banner.pos{background:var(--green-dim);border-color:rgba(34,201,138,0.25)}
.solde-banner.neg{background:var(--red-dim);border-color:rgba(240,92,92,0.25)}
.solde-banner.zero{background:var(--surface);border-color:var(--border)}
.solde-left{font-size:12px;color:var(--muted)}
.solde-val{font-family:var(--mono);font-size:22px;font-weight:500}
.solde-val.pos{color:var(--green)}.solde-val.neg{color:var(--red)}.solde-val.zero{color:var(--muted)}

.status-pill{display:flex;align-items:center;gap:8px;margin:0 1.25rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:8px 14px;min-height:40px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.paused{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.status-text{font-size:12px;color:var(--text);line-height:1.4}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 1.25rem .75rem}
.btn{border:1px solid var(--border2);border-radius:14px;background:var(--surface);color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;padding:14px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s;user-select:none;-webkit-user-select:none}
.btn:active:not(:disabled){transform:scale(0.95)}
.btn:disabled{opacity:.28;cursor:default}
.btn-icon{font-size:18px;line-height:1}
.btn-label{font-size:11px;color:var(--muted);font-weight:400}
.btn.green{border-color:rgba(34,201,138,0.3);background:var(--green-dim);color:var(--green)}
.btn.green .btn-label{color:rgba(34,201,138,0.6)}
.btn.red{border-color:rgba(240,92,92,0.3);background:var(--red-dim);color:var(--red)}
.btn.red .btn-label{color:rgba(240,92,92,0.6)}
.btn.amber{border-color:rgba(245,166,35,0.3);background:var(--amber-dim);color:var(--amber)}
.btn.amber .btn-label{color:rgba(245,166,35,0.6)}
.btn.blue{border-color:rgba(91,156,246,0.3);background:var(--blue-dim);color:var(--blue)}
.btn.blue .btn-label{color:rgba(91,156,246,0.6)}
.btn.purple{border-color:rgba(167,139,250,0.3);background:var(--purple-dim);color:var(--purple)}
.btn.purple .btn-label{color:rgba(167,139,250,0.6)}

.section{padding:0 1.25rem .75rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.section-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.divider{height:1px;background:var(--border);margin:.5rem 1.25rem .75rem}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--text);letter-spacing:-1px;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:11px;color:var(--muted)}

.entries-list{display:flex;flex-direction:column;gap:6px}
.entry{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.entry-day{font-size:12px;font-weight:500;color:var(--text);min-width:52px}
.entry-times{font-family:var(--mono);font-size:11px;color:var(--muted);flex:1;line-height:1.5}
.entry-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.entry-dur{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)}
.entry-diff{font-family:var(--mono);font-size:10px}
.entry-diff.pos{color:var(--green)}.entry-diff.neg{color:var(--red)}
.entry-actions{display:flex;gap:2px;flex-shrink:0}
.entry-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:3px 6px;line-height:1;border-radius:4px}
.entry-btn:active{color:var(--text)}
.live-badge{display:inline-block;font-size:10px;padding:2px 5px;border-radius:20px;font-weight:500;margin-left:3px;vertical-align:middle}
.live-badge.active{background:var(--green-dim);color:var(--green)}
.live-badge.paused{background:var(--amber-dim);color:var(--amber)}
.empty-msg{font-size:13px;color:var(--muted);text-align:center;padding:1.5rem 0}

.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.week-nav-btn{background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:16px;padding:6px 14px;cursor:pointer;font-family:var(--sans)}
.week-nav-btn:disabled{opacity:.3;cursor:default}
.week-nav-label{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center}

.export-btn{width:100%;padding:12px;border-radius:12px;background:var(--surface);border:1px solid var(--border2);color:var(--muted);font-family:var(--sans);font-size:13px;cursor:pointer;margin-top:8px}
.export-btn:active{color:var(--text)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:420px;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1.25rem}
.modal-row{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
.modal-label{font-size:12px;color:var(--muted)}
.modal-input{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:16px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none}
.modal-input:focus{border-color:rgba(91,156,246,0.5)}
.modal-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1.25rem}
.modal-btn{padding:13px;border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border2)}
.modal-btn.cancel{background:var(--surface2);color:var(--muted)}
.modal-btn.confirm{background:var(--green-dim);color:var(--green);border-color:rgba(34,201,138,0.3)}
</style>
</head>
<body>
<div class="app">

<div class="tabs">
  <button class="tab active" onclick="showPage('pointage')">Pointage</button>
  <button class="tab" onclick="showPage('historique')">Historique</button>
  <button class="tab" onclick="showPage('solde')">Solde</button>
</div>

<!-- PAGE POINTAGE -->
<div id="page-pointage" class="page active">
  <div class="topbar">
    <span class="topbar-title">Pointage</span>
    <span class="topbar-date" id="top-date"></span>
  </div>
  <div class="clock" id="clock">00:00:00</div>
  <div class="week-info" id="week-info">—</div>

  <div id="solde-banner" class="solde-banner zero">
    <div class="solde-left">Solde cumulé</div>
    <div class="solde-val zero" id="solde-val-main">0h00</div>
  </div>

  <div class="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Non pointé aujourd'hui</span>
  </div>

  <div class="btn-grid">
    <button class="btn green" id="btn-arrive" onclick="pointArrivee()">
      <span class="btn-icon">▶</span><span>Arrivée</span>
      <span class="btn-label">Enregistre l'heure</span>
    </button>
    <button class="btn red" id="btn-depart" onclick="pointDepart()" disabled>
      <span class="btn-icon">■</span><span>Départ</span>
      <span class="btn-label">Fin de journée</span>
    </button>
    <button class="btn amber" id="btn-pause" onclick="pointPause()" disabled>
      <span class="btn-icon">⏸</span><span>Début pause</span>
      <span class="btn-label">Pause…</span>
    </button>
    <button class="btn blue" id="btn-reprise" onclick="pointReprise()" disabled>
      <span class="btn-icon">▷</span><span>Fin pause</span>
      <span class="btn-label">Reprise</span>
    </button>
  </div>
  <div class="btn-grid" style="padding-top:0">
    <button class="btn purple" onclick="openModal(null)" style="grid-column:1/-1">
      <span class="btn-icon">✎</span><span>Saisie / correction manuelle</span>
      <span class="btn-label">Ajouter ou modifier une journée</span>
    </button>
  </div>

  <div class="divider"></div>
  <div class="section">
    <div class="section-header"><span class="section-title">Cette semaine</span></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="total-week">0h00</div><div class="stat-lbl">Total semaine</div></div>
      <div class="stat-card"><div class="stat-val" id="total-today">0h00</div><div class="stat-lbl">Aujourd'hui</div></div>
    </div>
  </div>
  <div class="section" style="padding-top:.5rem">
    <div class="section-header"><span class="section-title">Journées de la semaine</span></div>
    <div class="entries-list" id="entries-week"></div>
  </div>
</div>

<!-- PAGE HISTORIQUE -->
<div id="page-historique" class="page">
  <div class="section" style="padding-top:1rem">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="navWeek(-1)">‹</button>
      <div class="week-nav-label" id="hist-week-label">—</div>
      <button class="week-nav-btn" id="hist-next-btn" onclick="navWeek(1)">›</button>
    </div>
    <div class="stats-row" style="margin-bottom:.75rem">
      <div class="stat-card"><div class="stat-val" id="hist-total">0h00</div><div class="stat-lbl">Total semaine</div></div>
      <div class="stat-card"><div class="stat-val" id="hist-diff" style="color:var(--muted)">—</div><div class="stat-lbl">Écart semaine</div></div>
    </div>
    <div class="entries-list" id="entries-hist"></div>
    <button class="export-btn" onclick="exportCSV()">⬇ Exporter cette semaine (.csv)</button>
  </div>
</div>

<!-- PAGE SOLDE -->
<div id="page-solde" class="page">
  <div class="section" style="padding-top:1rem">
    <div class="section-header"><span class="section-title">Solde cumulé total</span></div>
    <div class="stat-card" style="margin-bottom:1rem;padding:20px">
      <div class="stat-val" id="solde-total" style="font-size:36px">0h00</div>
      <div class="stat-lbl">depuis le début</div>
    </div>
    <div class="section-header"><span class="section-title">Par semaine</span></div>
    <div class="entries-list" id="solde-weeks"></div>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Saisie manuelle</div>
    <div class="modal-row">
      <label class="modal-label">Date</label>
      <input class="modal-input" type="date" id="m-date">
    </div>
    <div class="modal-row-2">
      <div style="display:flex;flex-direction:column;gap:5px">
        <label class="modal-label">Arrivée</label>
        <input class="modal-input" type="time" id="m-arrivee">
      </div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <label class="modal-label">Départ</label>
        <input class="modal-input" type="time" id="m-depart">
      </div>
    </div>
    <div class="modal-row">
      <label class="modal-label">Pause totale (minutes)</label>
      <input class="modal-input" type="number" id="m-pause" min="0" max="480" placeholder="0">
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-btn confirm" onclick="confirmerSaisie()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

let state=JSON.parse(localStorage.getItem('pointage_v3')||'null')||{entries:[],current:null};
let histWeekOffset=0;
let editingIdx=null;

function save(){localStorage.setItem('pointage_v3',JSON.stringify(state))}

function fmtTime(ts){return new Date(ts).toTimeString().slice(0,5)}
function fmtDateShort(ts){const d=new Date(ts);return DAYS[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0')}
function diffH(a,b){return(b-a)/3600000}
function hhmm(h){
  const neg=h<0;const t=Math.round(Math.abs(h)*60);
  return(neg?'-':'')+Math.floor(t/60)+'h'+(t%60<10?'0':'')+t%60;
}
function hhmmSigned(h){return(h>=0?'+':'')+hhmm(h)}

function getWeekStartOf(d){
  const x=new Date(d);const day=x.getDay();
  x.setDate(x.getDate()-(day===0?6:day-1));x.setHours(0,0,0,0);return x;
}
function getWeekStart(){return getWeekStartOf(new Date())}
function sameDay(a,b){const x=new Date(a),y=new Date(b);return x.getFullYear()===y.getFullYear()&&x.getMonth()===y.getMonth()&&x.getDate()===y.getDate()}

function getObjectif(ts){
  const d=new Date(ts);const m=d.getHours()*60+d.getMinutes();
  if(m>=23*60)return 8+24/60;
  if(m<60)return 8+27/60;
  if(m<2*60+31)return 8+34/60;
  return null;
}

function computeHours(e){
  if(!e.depart)return null;
  let w=diffH(e.arrivee,e.depart);
  let p=(e.pauseMin||0)/60;
  (e.pauses||[]).forEach(x=>{if(x.fin)p+=diffH(x.debut,x.fin)});
  return Math.max(0,w-p);
}

function computeSolde(){
  let s=0;
  state.entries.forEach(e=>{
    const h=computeHours(e),obj=getObjectif(e.arrivee);
    if(h!==null&&obj!==null)s+=(h-obj);
  });
  return s;
}

function getWeekEntries(wsTs){
  return state.entries.filter(e=>e.arrivee>=wsTs&&e.arrivee<wsTs+7*24*3600000);
}

// PAGES
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const idx={'pointage':0,'historique':1,'solde':2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='historique')renderHistorique();
  if(name==='solde')renderSolde();
}

// RENDER MAIN
function render(){
  const now=new Date();
  document.getElementById('top-date').textContent=DAYS[now.getDay()]+' '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  const ws=getWeekStart(),we=new Date(ws.getTime()+6*24*3600000);
  document.getElementById('week-info').textContent='Sem. du '+ws.getDate()+' au '+we.getDate()+' '+MONTHS[we.getMonth()];

  const c=state.current;
  const isPaused=c&&c.pauses&&c.pauses.length>0&&!c.pauses[c.pauses.length-1].fin;
  document.getElementById('btn-arrive').disabled=!!c;
  document.getElementById('btn-depart').disabled=!c||isPaused;
  document.getElementById('btn-pause').disabled=!c||isPaused;
  document.getElementById('btn-reprise').disabled=!isPaused;

  // status pill
  const dot=document.getElementById('status-dot');
  const st=document.getElementById('status-text');
  if(!c){dot.className='status-dot';st.textContent='Non pointé aujourd\'hui';}
  else if(isPaused){
    const lp=c.pauses[c.pauses.length-1];
    dot.className='status-dot paused';
    st.textContent='En pause depuis '+fmtTime(lp.debut)+' ('+hhmm(diffH(lp.debut,Date.now()))+')';
  } else {
    dot.className='status-dot active';
    let p=0;(c.pauses||[]).forEach(x=>{if(x.fin)p+=diffH(x.debut,x.fin)});
    const netH=Math.max(0,diffH(c.arrivee,Date.now())-p);
    const obj=getObjectif(c.arrivee);
    if(obj!==null){
      const r=obj-netH;
      if(r>0){
        const finMs=c.arrivee+(obj+p)*3600000;
        st.textContent='Arrivé '+fmtTime(c.arrivee)+' · Obj '+hhmm(obj)+' · Reste '+hhmm(r)+' (fin ~'+fmtTime(finMs)+')';
      } else {
        st.textContent='Arrivé '+fmtTime(c.arrivee)+' · '+hhmm(netH)+' ✓ Objectif atteint';
      }
    } else {
      st.textContent='Arrivé à '+fmtTime(c.arrivee)+' — '+hhmm(netH)+' travaillées';
    }
  }

  // solde banner
  const solde=computeSolde();
  const banner=document.getElementById('solde-banner');
  const sv=document.getElementById('solde-val-main');
  sv.textContent=(solde>=0?'+':'')+hhmm(solde);
  banner.className='solde-banner '+(solde>0?'pos':solde<0?'neg':'zero');
  sv.className='solde-val '+(solde>0?'pos':solde<0?'neg':'zero');

  // week stats
  const wsTs=getWeekStart().getTime();
  const we2=getWeekEntries(wsTs);
  let tw=0,tt=0;
  we2.forEach(e=>{const h=computeHours(e);if(h!==null){tw+=h;if(sameDay(e.arrivee,now))tt+=h;}});
  document.getElementById('total-week').textContent=hhmm(tw);
  document.getElementById('total-today').textContent=hhmm(tt);

  renderList(document.getElementById('entries-week'),we2,c);
}

function renderList(container,entries,current){
  container.innerHTML='';
  const all=[...entries];if(current)all.push(current);
  if(all.length===0){container.innerHTML='<div class="empty-msg">Aucun pointage</div>';return;}
  all.sort((a,b)=>b.arrivee-a.arrivee).forEach(e=>{
    const isLive=!e.depart;
    const h=computeHours(e);
    const ePaused=isLive&&e.pauses&&e.pauses.length>0&&!e.pauses[e.pauses.length-1].fin;
    const np=(e.pauses||[]).filter(p=>p.fin).length+(e.pauseMin>0?1:0);
    const obj=getObjectif(e.arrivee);
    const diff=(!isLive&&h!==null&&obj!==null)?(h-obj):null;
    let times=fmtTime(e.arrivee)+' → '+(e.depart?fmtTime(e.depart):'…');
    if(np>0)times+=' · '+np+' pause'+(np>1?'s':'');
    const badge=isLive?`<span class="live-badge ${ePaused?'paused':'active'}">${ePaused?'⏸':'●'}</span>`:'';
    const gIdx=state.entries.indexOf(e);
    const editB=!isLive?`<button class="entry-btn" onclick="openModal(${gIdx})" title="Modifier">✎</button>`:'';
    const delB=!isLive?`<button class="entry-btn" onclick="delEntry(${gIdx})" title="Supprimer" style="color:var(--red)">✕</button>`:'';
    const objTxt=obj!==null?'<span style="font-size:10px;color:var(--muted)"> /'+hhmm(obj)+'</span>':'';
    const diffTxt=diff!==null?`<div class="entry-diff ${diff>=0?'pos':'neg'}">${hhmmSigned(diff)}</div>`:'';
    const div=document.createElement('div');div.className='entry';
    div.innerHTML=`
      <div class="entry-day">${fmtDateShort(e.arrivee)}${badge}</div>
      <div class="entry-times">${times}</div>
      <div class="entry-right"><div class="entry-dur">${h!==null?hhmm(h)+objTxt:'...'}</div>${diffTxt}</div>
      <div class="entry-actions">${editB}${delB}</div>`;
    container.appendChild(div);
  });
}

// HISTORIQUE
function renderHistorique(){
  const base=getWeekStartOf(new Date());
  base.setDate(base.getDate()+histWeekOffset*7);
  const wsTs=base.getTime();
  const we=new Date(wsTs+6*24*3600000);
  document.getElementById('hist-week-label').textContent=
    base.getDate()+'/'+String(base.getMonth()+1).padStart(2,'0')+' – '+we.getDate()+'/'+String(we.getMonth()+1).padStart(2,'0')+'/'+we.getFullYear();
  document.getElementById('hist-next-btn').disabled=histWeekOffset>=0;
  const entries=getWeekEntries(wsTs);
  let tot=0,totObj=0;
  entries.forEach(e=>{const h=computeHours(e),obj=getObjectif(e.arrivee);if(h!==null)tot+=h;if(obj!==null)totObj+=obj;});
  const diff=tot-totObj;
  document.getElementById('hist-total').textContent=hhmm(tot);
  const hd=document.getElementById('hist-diff');
  hd.textContent=totObj>0?hhmmSigned(diff):'—';
  hd.style.color=diff>=0?'var(--green)':'var(--red)';
  renderList(document.getElementById('entries-hist'),entries,null);
}
function navWeek(d){histWeekOffset+=d;if(histWeekOffset>0)histWeekOffset=0;renderHistorique();}

// SOLDE PAGE
function renderSolde(){
  const solde=computeSolde();
  const sv=document.getElementById('solde-total');
  sv.textContent=(solde>=0?'+':'')+hhmm(solde);
  sv.style.color=solde>0?'var(--green)':solde<0?'var(--red)':'var(--muted)';

  const weeks={};
  state.entries.forEach(e=>{
    const ws=getWeekStartOf(new Date(e.arrivee)).getTime();
    if(!weeks[ws])weeks[ws]=[];weeks[ws].push(e);
  });
  const container=document.getElementById('solde-weeks');
  container.innerHTML='';
  const sorted=Object.keys(weeks).map(Number).sort((a,b)=>b-a);
  if(sorted.length===0){container.innerHTML='<div class="empty-msg">Aucune donnée</div>';return;}
  sorted.forEach(ws=>{
    const we=new Date(ws+6*24*3600000);
    const ents=weeks[ws];let tot=0,totObj=0;
    ents.forEach(e=>{const h=computeHours(e),obj=getObjectif(e.arrivee);if(h!==null)tot+=h;if(obj!==null)totObj+=obj;});
    const diff=tot-totObj;
    const ds=new Date(ws);
    const div=document.createElement('div');div.className='entry';
    div.innerHTML=`
      <div class="entry-day" style="font-size:11px">${ds.getDate()}/${ds.getMonth()+1} – ${we.getDate()}/${we.getMonth()+1}</div>
      <div class="entry-times">${ents.length}j · ${hhmm(tot)} / ${hhmm(totObj)}</div>
      <div class="entry-right"><div class="entry-diff ${diff>=0?'pos':'neg'}" style="font-size:13px;font-weight:500">${hhmmSigned(diff)}</div></div>`;
    container.appendChild(div);
  });
}

// POINTAGE ACTIONS
function pointArrivee(){if(state.current)return;state.current={arrivee:Date.now(),pauses:[],pauseMin:0};save();render();}
function pointDepart(){
  if(!state.current)return;
  const c=state.current;
  if(c.pauses&&c.pauses.length>0&&!c.pauses[c.pauses.length-1].fin)return;
  c.depart=Date.now();state.entries.push(c);state.current=null;save();render();
}
function pointPause(){if(!state.current)return;state.current.pauses.push({debut:Date.now()});save();render();}
function pointReprise(){
  if(!state.current)return;
  const p=state.current.pauses;
  if(p.length>0&&!p[p.length-1].fin)p[p.length-1].fin=Date.now();
  save();render();
}
function delEntry(idx){
  if(idx<0||idx>=state.entries.length)return;
  if(!confirm('Supprimer cette journée ?'))return;
  state.entries.splice(idx,1);save();render();
  renderHistorique();renderSolde();
}

// MODAL
function openModal(idx){
  editingIdx=idx;
  document.getElementById('modal-title').textContent=idx!==null?'Modifier la journée':'Saisie manuelle';
  if(idx!==null&&idx>=0){
    const e=state.entries[idx];
    const d=new Date(e.arrivee);
    document.getElementById('m-date').value=d.toISOString().slice(0,10);
    document.getElementById('m-arrivee').value=fmtTime(e.arrivee);
    document.getElementById('m-depart').value=e.depart?fmtTime(e.depart):'';
    document.getElementById('m-pause').value=e.pauseMin||0;
  } else {
    const n=new Date();
    document.getElementById('m-date').value=n.toISOString().slice(0,10);
    document.getElementById('m-arrivee').value='';
    document.getElementById('m-depart').value='';
    document.getElementById('m-pause').value='0';
  }
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingIdx=null;}
function closeModalOverlay(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function confirmerSaisie(){
  const dateV=document.getElementById('m-date').value;
  const arrV=document.getElementById('m-arrivee').value;
  const depV=document.getElementById('m-depart').value;
  const pauseV=parseInt(document.getElementById('m-pause').value)||0;
  if(!dateV||!arrV||!depV){alert('Veuillez remplir la date, l\'arrivée et le départ.');return;}
  let arrTs=new Date(dateV+'T'+arrV+':00').getTime();
  let depTs=new Date(dateV+'T'+depV+':00').getTime();
  if(depTs<=arrTs)depTs+=24*3600000; // travail de nuit → lendemain
  const entry={arrivee:arrTs,depart:depTs,pauses:[],pauseMin:pauseV};
  if(editingIdx!==null&&editingIdx>=0){
    state.entries[editingIdx]=entry;
  } else {
    state.entries.push(entry);
  }
  state.entries.sort((a,b)=>a.arrivee-b.arrivee);
  save();closeModal();render();renderHistorique();renderSolde();
}

// EXPORT
function exportCSV(){
  const base=getWeekStartOf(new Date());
  base.setDate(base.getDate()+histWeekOffset*7);
  const wsTs=base.getTime();
  const entries=getWeekEntries(wsTs);
  const rows=['Jour,Date,Arrivée,Départ,Pauses (min),Heures travaillées,Objectif,Écart'];
  entries.forEach(e=>{
    const d=new Date(e.arrivee);const h=computeHours(e);const obj=getObjectif(e.arrivee);
    let pm=(e.pauseMin||0);(e.pauses||[]).forEach(p=>{if(p.fin)pm+=Math.round(diffH(p.debut,p.fin)*60)});
    rows.push([DAYS[d.getDay()],d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear(),
      fmtTime(e.arrivee),e.depart?fmtTime(e.depart):'',pm,
      h!==null?h.toFixed(2):'',obj!==null?obj.toFixed(2):'',
      (h!==null&&obj!==null)?(h-obj).toFixed(2):''
    ].join(','));
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pointage.csv';a.click();
}

// CLOCK
setInterval(()=>{
  document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);
  if(document.getElementById('page-pointage').classList.contains('active'))render();
},1000);
render();
</script>
